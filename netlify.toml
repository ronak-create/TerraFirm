[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — every route serves the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed build assets never change → cache them forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Company snapshot: serve cached, refresh in the background.
[[headers]]
  for = "/companies.seed.json"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
